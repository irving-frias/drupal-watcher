name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version (auto-tag)
        id: tag
        uses: anothrNick/github-tag-action@v1
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true
          DEFAULT_BUMP: patch
          RELEASE_BRANCHES: main

      - name: Set version
        id: version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ steps.tag.outputs.tag }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Run tests
        run: go test ./...

      - name: Cross-compile
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          LDFLAGS="-X github.com/irving-frias/drupal-watcher/internal/cli.Version=${VERSION#v}"
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -ldflags "$LDFLAGS" -o "dist/drupal-watcher-linux-amd64" ./cmd/drupal-watcher
          GOOS=linux   GOARCH=arm64 go build -ldflags "$LDFLAGS" -o "dist/drupal-watcher-linux-arm64" ./cmd/drupal-watcher
          GOOS=darwin  GOARCH=amd64 go build -ldflags "$LDFLAGS" -o "dist/drupal-watcher-darwin-amd64" ./cmd/drupal-watcher
          GOOS=darwin  GOARCH=arm64 go build -ldflags "$LDFLAGS" -o "dist/drupal-watcher-darwin-arm64" ./cmd/drupal-watcher
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o "dist/drupal-watcher-windows-amd64.exe" ./cmd/drupal-watcher

      - name: Archive binaries
        run: |
          cd dist
          for f in drupal-watcher-*; do
            if [[ "$f" == *.exe ]]; then
              zip "${f%.exe}.zip" "$f"
            else
              gzip -c "$f" > "$f.gz"
            fi
            rm "$f"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/*
          generate_release_notes: true
