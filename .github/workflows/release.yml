name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.extra["drupal-watcher-version"] // "1.0.0"' composer.json)
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists. Bump version in composer.json first."
            exit 1
          fi

      - name: Build all platforms
        run: |
          mkdir -p dist
          platforms=("linux/amd64" "linux/arm64" "darwin/amd64" "darwin/arm64" "windows/amd64")
          for platform in "${platforms[@]}"; do
            goos="${platform%/*}"
            goarch="${platform#*/}"
            output="dist/drupal-watcher-${goos}-${goarch}"
            if [ "$goos" = "windows" ]; then
              output="${output}.exe"
            fi
            GOOS=$goos GOARCH=$goarch go build -o "$output" ./cmd/drupal-watcher
          done

      - name: Package assets
        run: |
          mkdir -p assets
          # Unix — gzip
          for f in dist/drupal-watcher-linux-* dist/drupal-watcher-darwin-*; do
            gzip -c "$f" > "assets/$(basename "$f").gz"
          done
          # Windows — zip
          zip -j "assets/drupal-watcher-windows-amd64.zip" dist/drupal-watcher-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: drupal-watcher ${{ steps.version.outputs.tag }}
          files: assets/*
          fail_on_unmatched_files: false
          generate_release_notes: true

      - name: Bump patch version
        id: bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Split semver
          IFS='.' read -r major minor patch <<< "$VERSION"
          next="${major}.${minor}.$((patch + 1))"
          echo "next=${next}" >> "$GITHUB_OUTPUT"

      - name: Update composer.json
        run: |
          jq ".extra[\"drupal-watcher-version\"] = \"${{ steps.bump.outputs.next }}\"" composer.json > composer.tmp && mv composer.tmp composer.json

      - name: Commit bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add composer.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.next }}"
          git push
