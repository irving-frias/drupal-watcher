name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install ALSA (Linux audio)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libasound2-dev
      - name: Test
        run: go test -count=1 ./...
      - name: Vet
        run: go vet ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.extra["drupal-watcher-version"] // "1.0.0"' composer.json)
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install ALSA (Linux audio)
        if: matrix.goos == 'linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libasound2-dev

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.goos == 'linux' && matrix.goarch == 'amd64' && '1' || '0' }}
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -o "drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}.exe" ./cmd/drupal-watcher
          else
            go build -o "drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/drupal-watcher
          fi

      - name: Package (unix)
        if: matrix.goos != 'windows'
        run: |
          gzip -c "drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}" > "drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}.gz"

      - name: Package (windows)
        if: matrix.goos == 'windows'
        run: |
          zip "drupal-watcher-windows-${{ matrix.goarch }}.zip" "drupal-watcher-windows-${{ matrix.goarch }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}.*
          compression-level: 0

  release:
    needs: [test, build]
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        run: |
          VERSION=$(jq -r '.extra["drupal-watcher-version"] // "1.0.0"' composer.json)
          echo "tag=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check tag
        id: check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        if: steps.check.outputs.exists == 'false'
        with:
          path: artifacts

      - name: Collect assets
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p assets
          find artifacts -type f | while read f; do
            cp "$f" assets/
          done

      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: drupal-watcher ${{ steps.version.outputs.tag }}
          files: assets/*
          fail_on_unmatched_files: false
          generate_release_notes: true

      - name: Bump patch version
        if: steps.check.outputs.exists == 'false'
        id: bump
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          IFS='.' read -r major minor patch <<< "$VERSION"
          next="${major}.${minor}.$((patch + 1))"
          echo "next=${next}" >> "$GITHUB_OUTPUT"

      - name: Update composer.json
        if: steps.check.outputs.exists == 'false'
        run: |
          jq ".extra[\"drupal-watcher-version\"] = \"${{ steps.bump.outputs.next }}\"" composer.json > composer.tmp && mv composer.tmp composer.json

      - name: Commit bump
        if: steps.check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add composer.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.next }}"
          git pull --rebase origin main && git push origin main
