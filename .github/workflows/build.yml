name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Test
        run: go test -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Build (linux/amd64)
        run: go build -o drupal-watcher-linux-amd64 ./cmd/drupal-watcher

      - uses: actions/upload-artifact@v4
        with:
          name: drupal-watcher-linux-amd64
          path: drupal-watcher-linux-amd64
          compression-level: 0

      - name: Get version
        id: version
        run: |
          BASE=$(jq -r '.extra["drupal-watcher-version"] // "v1.0.0"' composer.json)
          echo "tag=${BASE}.${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Compress for release
        run: gzip -c drupal-watcher-linux-amd64 > drupal-watcher-linux-amd64.gz

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: drupal-watcher ${{ steps.version.outputs.tag }}
          files: |
            drupal-watcher-linux-amd64.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
