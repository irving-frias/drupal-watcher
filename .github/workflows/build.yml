name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Test
        run: go test -count=1 ./...
      - name: Vet
        run: go vet ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            go build -o "drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}.exe" ./cmd/drupal-watcher
          else
            go build -o "drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}" ./cmd/drupal-watcher
          fi

      - name: Package (unix)
        if: matrix.goos != 'windows'
        run: |
          gzip -c "drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}" > "drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}.gz"

      - name: Package (windows)
        if: matrix.goos == 'windows'
        run: |
          zip "drupal-watcher-windows-${{ matrix.goarch }}.zip" "drupal-watcher-windows-${{ matrix.goarch }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            drupal-watcher-${{ matrix.goos }}-${{ matrix.goarch }}.*
          compression-level: 0
